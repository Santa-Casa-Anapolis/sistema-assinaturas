version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assinaturas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assinaturas_net
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass redispass123
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - assinaturas_net
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/assinaturas_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redispass123
      JWT_SECRET: "super-secret-chave"
    networks:
      - assinaturas_net
      - traefik_public
    depends_on:
      - postgres
      - redis
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.assinaturas-backend.rule=Host(`api.assinaturas.santacasa.org`)"
        - "traefik.http.routers.assinaturas-backend.entrypoints=websecure"
        - "traefik.http.routers.assinaturas-backend.tls.certresolver=le"
        - "traefik.http.services.assinaturas-backend.loadbalancer.server.port=3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: "https://api.assinaturas.santacasa.org"
    networks:
      - traefik_public
      - assinaturas_net
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.assinaturas-frontend.rule=Host(`assinaturas.santacasa.org`)"
        - "traefik.http.routers.assinaturas-frontend.entrypoints=websecure"
        - "traefik.http.routers.assinaturas-frontend.tls.certresolver=le"
        - "traefik.http.services.assinaturas-frontend.loadbalancer.server.port=80"

volumes:
  postgres_data:
  redis_data:

networks:
  assinaturas_net:
    driver: overlay
  traefik_public:
    external: true
